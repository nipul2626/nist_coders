version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: eventflex_postgres
    environment:
      POSTGRES_USER: eventflex
      POSTGRES_PASSWORD: password
      POSTGRES_DB: eventflex_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventflex -d eventflex_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: eventflex_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: eventflex_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eventflex.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: eventflex_redis_ui
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles:
      - tools
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: eventflex_network
